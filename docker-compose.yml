# Fleur d'AmOurs — Stack Node.js (VPS = source unique)
# Next.js + MariaDB — pas de PHP
#
# Usage:
#   1. Copier docker-compose.env.example en docker-compose.env
#   2. Remplir les variables (DB, JWT, etc.)
#   3. Si MariaDB vide : npm run sync:db (voir sync-config.env)
#   4. docker compose up -d
#
# Coolify : Add Resource → Docker Compose

services:
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-default}
      MARIADB_USER: ${DB_USER:-mariadb}
      MARIADB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requis}
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requis}
    volumes:
      - mariadb_data:/var/lib/mysql
    expose:
      - "3306"
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 5

  fleur:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        SOURCE_COMMIT: ${SOURCE_COMMIT:-unknown}
    image: fleur-legacy:latest
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      USE_NODE_API: "true"
      DB_HOST: mariadb
      DB_NAME: ${DB_NAME:-default}
      DB_USER: ${DB_USER:-mariadb}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requis}
      DB_PREFIX: ${DB_PREFIX:-wp_}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET requis}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-720}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-https://legacy.eludein.art/jardin}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}

volumes:
  mariadb_data:
